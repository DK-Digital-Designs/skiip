<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Portal | Skiip</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .order-row {
            display: grid;
            grid-template-columns: 80px 1fr 120px 200px;
            gap: 16px;
            padding: 16px;
            background: var(--card);
            border: 1px solid var(--stroke);
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            align-items: center;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
        }

        .status-placed {
            background: #3b82f6;
            color: white;
        }

        .status-preparing {
            background: #f59e0b;
            color: white;
        }

        .status-ready {
            background: #10b981;
            color: white;
        }
    </style>
</head>

<body style="background: #050507;">

    <nav style="background: var(--bg); border-bottom: 1px solid var(--stroke); padding: 16px 24px;">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-16">
                <a href="../index.html" class="logo" style="font-size: 20px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="currentColor" />
                    </svg>
                    SKI<span>IP</span>
                </a>
                <div style="width: 1px; height: 24px; background: var(--stroke);"></div>
                <select id="vendor-login" style="background: transparent; border: none; font-weight: 600; padding: 0;">
                    <!-- Populated by JS -->
                </select>
            </div>
            <div id="vendor-status" class="flex items-center gap-16">
                <div class="flex items-center gap-8">
                    <span style="font-size: 14px; color: var(--muted);">Serving:</span>
                    <span id="now-serving-count" class="text-accent"
                        style="font-size: 20px; font-weight: 800;">---</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="container" style="padding-top: 40px;">
        <div class="flex justify-between items-end mb-40">
            <div>
                <h1 style="font-size: 32px; margin-bottom: 8px;">Order Dashboard</h1>
                <p class="text-muted">Manage live orders and fulfillment.</p>
            </div>
            <button id="refresh-btn" class="btn btn-ghost" style="padding: 10px 20px; font-size: 14px;">Refresh
                ↻</button>
        </div>

        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 40px;">
            <div class="card text-center">
                <h2 id="count-new">0</h2>
                <p class="text-muted" style="font-size: 12px; text-transform: uppercase;">New Orders</p>
            </div>
            <div class="card text-center">
                <h2 id="count-preparing">0</h2>
                <p class="text-muted" style="font-size: 12px; text-transform: uppercase;">In Prep</p>
            </div>
            <div class="card text-center">
                <h2 id="count-ready">0</h2>
                <p class="text-muted" style="font-size: 12px; text-transform: uppercase;">Ready</p>
            </div>
        </div>

        <div id="orders-list-header" class="order-row"
            style="background: transparent; border: none; font-weight: 700; font-size: 12px; color: var(--muted); text-transform: uppercase;">
            <span>Token</span>
            <span>Items</span>
            <span>Status</span>
            <span>Actions</span>
        </div>

        <div id="orders-list">
            <!-- Populated by JS -->
        </div>
    </main>

    <script type="module" src="../assets/js/app-vendor.js"></script>
</body>

</html>
