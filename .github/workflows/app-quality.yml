name: App Quality Checks

on:
  push:
    paths:
      - 'app/**'
      - 'supabase/**'
      - '.github/workflows/app-quality.yml'
  pull_request:
    paths:
      - 'app/**'
      - 'supabase/**'

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
