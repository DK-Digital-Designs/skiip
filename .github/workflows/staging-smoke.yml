name: Staging Smoke Checks

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Optional staging app URL override. Falls back to the staging environment secret.
        required: false
        type: string
  schedule:
    - cron: '0 6 * * 1-5'

permissions:
  contents: read

concurrency:
  group: staging-smoke
  cancel-in-progress: false

jobs:
  smoke:
    name: Playwright staging smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging
    defaults:
      run:
        working-directory: app
    env:
      PLAYWRIGHT_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || secrets.PLAYWRIGHT_BASE_URL }}
      PLAYWRIGHT_BUYER_EMAIL: ${{ secrets.PLAYWRIGHT_BUYER_EMAIL }}
      PLAYWRIGHT_BUYER_PASSWORD: ${{ secrets.PLAYWRIGHT_BUYER_PASSWORD }}
      PLAYWRIGHT_SELLER_EMAIL: ${{ secrets.PLAYWRIGHT_SELLER_EMAIL }}
      PLAYWRIGHT_SELLER_PASSWORD: ${{ secrets.PLAYWRIGHT_SELLER_PASSWORD }}
      PLAYWRIGHT_ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_ADMIN_EMAIL }}
      PLAYWRIGHT_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_ADMIN_PASSWORD }}
      PLAYWRIGHT_REQUIRE_AUTH_CREDENTIALS: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run staging smoke suite
        run: npm run test:e2e

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/test-results
          if-no-files-found: ignore
