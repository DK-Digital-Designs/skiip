<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Menu | Skiip</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .vendor-filter {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 20px;
            scrollbar-width: none;
        }

        .vendor-filter::-webkit-scrollbar {
            display: none;
        }

        .filter-chip {
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--card);
            border: 1px solid var(--stroke);
            white-space: nowrap;
            font-size: 14px;
            color: var(--muted);
        }

        .filter-chip.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
            font-weight: 600;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: var(--card);
            border-radius: var(--radius-sm);
            margin-bottom: 12px;
            border: 1px solid var(--stroke);
        }

        .cart-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--bg);
            border-top: 1px solid var(--stroke);
            border-radius: 24px 24px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 1001;
            padding: 24px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .cart-drawer.open {
            transform: translateY(0);
        }

        .cart-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 1000;
        }

        .cart-summary {
            position: fixed;
            bottom: 70px;
            left: 20px;
            right: 20px;
            background: var(--accent);
            color: var(--bg);
            padding: 16px 24px;
            border-radius: 16px;
            display: none;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            box-shadow: 0 8px 24px rgba(242, 181, 33, 0.3);
            z-index: 999;
        }
    </style>
</head>

<body style="padding-bottom: 140px;">

    <div
        style="background: var(--accent); color: var(--bg); padding: 8px; text-align: center; font-size: 12px; font-weight: 700;">
        PROTOTYPE — NO REAL PAYMENTS
    </div>

    <header style="position: sticky; top: 0; background: var(--bg); z-index: 10; padding: 20px 0;">
        <div class="container flex items-center gap-16">
            <a href="index.html" style="font-size: 24px; padding-right: 8px;">←</a>
            <div>
                <h1 style="font-size: 20px;">Browse Menu</h1>
                <p id="current-festival-name" class="text-muted" style="font-size: 12px;">Loading...</p>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="vendor-list" class="vendor-filter">
            <!-- Populated by JS -->
        </div>

        <div id="menu-container">
            <!-- Populated by JS -->
            <div class="text-center text-muted" style="padding: 40px;">
                Select a vendor to see their menu items.
            </div>
        </div>
    </main>

    <div id="cart-summary" class="cart-summary">
        <span id="cart-count">2 Items</span>
        <span>View Cart • $<span id="cart-total">0.00</span></span>
    </div>

    <div id="cart-backdrop" class="cart-backdrop"></div>
    <div id="cart-drawer" class="cart-drawer">
        <div class="flex justify-between items-center mb-40">
            <h3>Your Order</h3>
            <button id="close-cart" style="background: none; color: var(--muted); font-size: 24px;">&times;</button>
        </div>

        <div id="cart-items" class="mb-40">
            <!-- Populated by JS -->
        </div>

        <div style="border-top: 1px solid var(--stroke); padding-top: 20px; margin-bottom: 32px;">
            <div class="flex justify-between mb-12">
                <span class="text-muted">Subtotal</span>
                <span id="drawer-subtotal">$0.00</span>
            </div>
            <div class="flex justify-between mb-12">
                <span class="text-muted">Platform Fee</span>
                <span>$0.50</span>
            </div>
            <div class="flex justify-between" style="font-weight: 700; font-size: 18px;">
                <span>Total</span>
                <span id="drawer-total" class="text-accent">$0.50</span>
            </div>
        </div>

        <button id="checkout-btn" class="btn btn-primary" style="width: 100%;">Pay & Place Order</button>
    </div>

    <nav
        style="position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(11,11,15,0.9); backdrop-filter: blur(12px); border-top: 1px solid var(--stroke); display: flex; justify-content: space-around; padding: 12px 0; z-index: 10;">
        <a href="index.html" class="flex flex-col items-center" style="font-size: 10px; opacity: 0.6;">
            <span style="font-size: 20px;">🏠</span> Home
        </a>
        <a href="menu.html" class="text-accent flex flex-col items-center" style="font-size: 10px; font-weight: 600;">
            <span style="font-size: 20px;">🍔</span> Menu
        </a>
        <a href="queue.html" class="flex flex-col items-center" style="font-size: 10px; opacity: 0.6;">
            <span style="font-size: 20px;">⏳</span> Queue
        </a>
        <a href="orders.html" class="flex flex-col items-center" style="font-size: 10px; opacity: 0.6;">
            <span style="font-size: 20px;">📜</span> History
        </a>
    </nav>

    <script type="module" src="../assets/js/app-attendee.js"></script>
</body>

</html>
